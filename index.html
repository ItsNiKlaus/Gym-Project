    <style>
        /*CSS Reset*/
        body {

            background: url('img/gym1.jpg');

        .left {
            display: inline-block;

        .mid {

<body>
    <header class="header">

        <!-- Left box for logo -->
        <div class="left">
            <img src="img/gym3.png" alt="">

        <!-- Mid box for navigation bar -->

            <ul class="navbar">
                <li><a href="#" class="active">Home</a></li>

    <div class="container">

        <form action="noaction.php">
            <div class="formgroup">
                <input type="text" name="" placeholder="Enter Your Name">
            </div>
            <div class="formgroup">
                <input type="text" name="" placeholder="Enter Your Age">
            </div>
            <div class="formgroup">
                <label for="Plan"></label>
                <select name="myGender" class="options">
                    <option value="cyg">Choose Your Gender</option>
                    <option value="m">Male</option>
                    <option value="f">Female</option>
                </select>
            </div>
            <div class="formgroup">
                <input type="text" name="" placeholder="Enter Your Locality">
            </div>
            <div class="formgroup">
                <label for="Plan"></label>
                <select name="myPlan" class="options">
                    <option value="cyp">Choose Your Plan</option>
                    <option value="1m">1 Month</option>
                    <option value="3m">3 Months</option>
                    <option value="6m">6 Months</option>
                    <option value="1y">1 Year</option>
                </select>
            </div>

            <div>
                <input type="reset" value="Reset" id="resetbtn">
            </div>
        </form>
